// GrowlerDB wire schema — shared types (Design 08). The proto is the canonical wire
// form; breaking changes bump the package to growlerdb.v2.
syntax = "proto3";

package growlerdb.v1;

// Java codegen for the connector; ignored by prost (Rust).
option java_multiple_files = true;
option java_package = "io.growlerdb.proto.v1";

// A scalar field value. Mirrors growlerdb-core's Value.
message Value {
  oneof kind {
    string str = 1;
    int64 int = 2;
    double float = 3;
    bool bool = 4;
    // A temporal instant (date or timestamp) as canonical epoch microseconds UTC.
    // Mirrors growlerdb-core's Value::Ts.
    int64 ts_micros = 5;
  }
}

// One field of a composite key: dotted leaf path + value.
message Field {
  string name = 1;
  Value value = 2;
}

// The composite document key: partition fields ++ identifier fields.
message Coordinates {
  repeated Field partition = 1;
  repeated Field identifier = 2;
}

// A position in the source stream that a committed index state reflects.
message SourceCheckpoint {
  oneof kind {
    int64 iceberg_snapshot = 1;
  }
  // The snapshot's Iceberg data sequence number — lineage-monotone along a branch
  // (v2 tables), the only sound order over snapshot ids (which are random longs).
  // 0/absent = unknown (a v1 table): receivers fall back to exact-match checkpoint
  // semantics.
  int64 iceberg_sequence_number = 2;
}

// Structured error detail accompanying a gRPC status (Design 08).
message Error {
  string code = 1;
  string message = 2;
  repeated string details = 3;
}
