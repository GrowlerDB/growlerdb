version: 2
# Minor + patch updates are grouped into ONE PR per ecosystem (weekly) to keep the queue small;
# major updates still open as individual PRs so a breaking bump gets its own review + CI signal.
updates:
  # Rust workspace
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor:
        patterns: ["*"]
        update-types: [minor, patch]
  # Console (Svelte SPA)
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      ui-minor:
        patterns: ["*"]
        update-types: [minor, patch]
  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        patterns: ["*"]
        update-types: [minor, patch]
  # JVM connectors (Spark + Trino)
  - package-ecosystem: maven
    directory: /connector
    schedule:
      interval: weekly
    groups:
      connector-minor:
        patterns: ["*"]
        update-types: [minor, patch]
  - package-ecosystem: maven
    directory: /connector-trino
    schedule:
      interval: weekly
    groups:
      connector-trino-minor:
        patterns: ["*"]
        update-types: [minor, patch]
  # Server image base
  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly
    groups:
      docker-minor:
        patterns: ["*"]
        update-types: [minor, patch]
