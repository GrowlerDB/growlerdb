# Grouped, weekly dependency updates. Grouping is the anti-flood control: an ungrouped config opens a
# separate PR per dependency, and pre-1.0 `0.x` crates make this worse because Dependabot counts a
# `0.x` minor bump (e.g. 0.9 -> 0.11) as "major", so each got its own PR. Each ecosystem now bundles
# minor/patch into one PR AND major/breaking bumps into a SECOND PR: routine updates stay trivially
# mergeable, while breaking bumps land together for one careful review instead of N separate PRs.
# Security updates are enabled in repo settings, not here.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]
      cargo-major:
        update-types: [major]
    ignore:
      # Candle is on the way out (TASK-332 moves the reranker to ONNX; the embedder is already ONNX),
      # and candle 0.11 breaks the current reranker build — don't churn on candle upgrades until it's
      # removed. Security updates still come through (repo settings), just not version bumps.
      - dependency-name: "candle-*"

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
      npm-major:
        update-types: [major]

  - package-ecosystem: maven
    directory: /connector
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      maven-minor-patch:
        update-types: [minor, patch]
      maven-major:
        update-types: [major]
    # Hold Spark at 4.1.x: Spark 4.2.0 turned `catalog.View` from an interface into a
    # class, so Iceberg 1.11.0's `SparkView` fails to load (IncompatibleClassChange) and
    # the connector integration tests all error out. Spark and Iceberg must move together;
    # lift this once an Iceberg release supports Spark 4.2 (bump both in one PR).
    ignore:
      - dependency-name: "org.apache.spark:*"
        versions: [">=4.2.0"]

  - package-ecosystem: maven
    directory: /connector-trino
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      maven-minor-patch:
        update-types: [minor, patch]
      maven-major:
        update-types: [major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
