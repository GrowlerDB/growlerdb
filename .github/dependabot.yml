# Grouped, weekly dependency updates. Grouping minor/patch into one PR per ecosystem is the
# anti-flood control: an ungrouped config opens a separate PR per dependency. Major bumps are
# left ungrouped so each gets deliberate review. Security updates are enabled in repo settings,
# not here.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: maven
    directory: /connector
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      maven-minor-patch:
        update-types: [minor, patch]
    # Hold Spark at 4.1.x: Spark 4.2.0 turned `catalog.View` from an interface into a
    # class, so Iceberg 1.11.0's `SparkView` fails to load (IncompatibleClassChange) and
    # the connector integration tests all error out. Spark and Iceberg must move together;
    # lift this once an Iceberg release supports Spark 4.2 (bump both in one PR).
    ignore:
      - dependency-name: "org.apache.spark:*"
        versions: [">=4.2.0"]

  - package-ecosystem: maven
    directory: /connector-trino
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      maven-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
