# Contributor License Agreement gate. Comments a one-time signing link on a contributor's first PR and
# records their signature (in the `cla-signatures` branch). Inactive until the repo secret
# PERSONAL_ACCESS_TOKEN (a repo-scoped PAT used to store signatures) is set — the step is skipped when
# it's absent, so the check stays green pre-configuration. Set it before the repo goes public.
name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    env:
      HAS_PAT: ${{ secrets.PERSONAL_ACCESS_TOKEN != '' }}
    steps:
      - name: CLA assistant
        if: >-
          env.HAS_PAT == 'true' &&
          (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
           github.event_name == 'pull_request_target')
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-document: 'https://github.com/GrowlerDB/growlerdb/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot]'
