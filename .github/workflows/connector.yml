name: connector

# The JVM connector subprojects (Spark + Trino) — isolated from the Rust fast path: runs
# only when a connector or the shared protos change.
on:
  push:
    branches: [main]
    paths: ["connector/**", "connector-trino/**", "crates/growlerdb-proto/proto/**", ".github/workflows/connector.yml"]
  pull_request:
    paths: ["connector/**", "connector-trino/**", "crates/growlerdb-proto/proto/**", ".github/workflows/connector.yml"]

concurrency:
  group: connector-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # pull_request runs on GitHub-hosted, push (main) on self-hosted — see ADR d34 (runner safety).
  build:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Cache Maven repository
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('connector/pom.xml') }}
          restore-keys: m2-
      # Surface disk headroom — the self-hosted runners are space-constrained (see ci.yml).
      - name: Disk free
        run: df -h / "$HOME" "$RUNNER_TEMP" || true
      # JDK 21 + Maven both come from mise (mise.toml), so this doesn't depend on the
      # self-hosted runner shipping a system `mvn` (it doesn't).
      - name: Build + test (Spark connector, JDK 21)
        working-directory: connector
        run: |
          mise install
          mise exec -- mvn -B -q verify
      # The Trino connector is a separate module on JDK 23 (Trino 470's SPI bytecode) — its own
      # mise.toml provisions the newer JDK, so `mise install` here picks it up independently.
      - name: Build + test (Trino connector, JDK 23)
        working-directory: connector-trino
        run: |
          mise install
          mise exec -- mvn -B -q verify
