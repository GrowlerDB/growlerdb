name: connector

# The JVM connector subprojects (Spark + Trino) — isolated from the Rust fast path: runs
# only when a connector or the shared protos change.
on:
  push:
    branches: [main]
    paths: ["connector/**", "connector-trino/**", "crates/growlerdb-proto/proto/**", ".github/workflows/connector.yml"]
  pull_request:
    paths: ["connector/**", "connector-trino/**", "crates/growlerdb-proto/proto/**", ".github/workflows/connector.yml"]

concurrency:
  group: connector-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # All runs on GitHub-hosted runners — see ADR d34 (runner safety for a public repo).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Cache Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('connector/pom.xml') }}
          restore-keys: m2-
      # Surface disk headroom — the self-hosted runners are space-constrained (see ci.yml).
      - name: Disk free
        run: df -h / "$HOME" "$RUNNER_TEMP" || true
      # JDK 21 + Maven both come from mise (mise.toml), so this doesn't depend on the
      # self-hosted runner shipping a system `mvn` (it doesn't).
      #
      # Runs unit AND the Spark **integration** group in the PR gate. The integration tests are the
      # in-JVM Spark/Iceberg ones that catch a binary-incompatible dependency bump — e.g. Spark 4.2.0
      # (#103) passed the old unit-only gate but broke every integration test (Iceberg 1.11's
      # `SparkView` no longer loaded). `-Dtest.excludedGroups=e2e` narrows the pom's default
      # `integration,e2e` exclusion to just `e2e`, so unit + integration both run; only the
      # cross-process `e2e` group (needs the built `growlerdb` binary) stays nightly.
      - name: Build + test (Spark connector, JDK 21) — unit + Spark integration
        working-directory: connector
        run: |
          mise install
          mise exec -- mvn -B -q verify -Dtest.excludedGroups=e2e
          # Guard the silent-zero trap: a groups/config regression could select ZERO integration
          # tests and still pass green (the exact failure mode that hides a broken bump). Require the
          # Spark integration suite to have actually produced a report.
          test -f target/surefire-reports/io.growlerdb.connector.ConnectorJobIntegrationTest.txt \
            || { echo "::error::Spark connector integration tests did not run — check the pom test groups"; exit 1; }
      # The Trino connector is a separate module on JDK 23 (Trino 470's SPI bytecode) — its own
      # mise.toml provisions the newer JDK, so `mise install` here picks it up independently.
      - name: Build + test (Trino connector, JDK 23)
        working-directory: connector-trino
        run: |
          mise install
          mise exec -- mvn -B -q verify
