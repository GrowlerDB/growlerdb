name: release

# Cut a release two ways (see RELEASING.md):
#   - workflow_dispatch with `bump: patch|minor|major` — the gate runs, then the next version is
#     computed from the last `v*` tag and the tag is created for you.
#   - pushing a `v*` SemVer tag by hand — uses that tag verbatim.
# Either way it publishes a signed multi-arch container + SBOM, the Helm chart (OCI), and release
# binaries with checksums. Artifacts are tag-derived; the in-tree workspace version stays 0.0.0.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump from the last released tag (ignored for the first release → 0.1.0)"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write # create the GitHub Release + upload assets, and push the computed tag
  packages: write # push image + chart to GHCR
  id-token: write # cosign keyless signing via GitHub OIDC

env:
  REGISTRY: ghcr.io

jobs:
  # The full CI gate must pass before anything is published (and before a dispatch tag is created).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  # Resolve the release version (and, for a dispatch, create the tag) only after the gate is green,
  # so a failing gate never leaves an orphan tag behind. Outputs feed every publishing job.
  version:
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      major: ${{ steps.v.outputs.major }}
      minor: ${{ steps.v.outputs.minor }}
      image: ${{ steps.v.outputs.image }}
      owner_lc: ${{ steps.v.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need the full tag history to compute the next version
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="$(scripts/next-version.sh "${{ inputs.bump }}")"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v${version}" -m "v${version}"
            git push origin "v${version}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          major="${version%%.*}"; rest="${version#*.}"; minor="${rest%%.*}"
          # GHCR / OCI paths must be lowercase; the org login (github.repository[_owner]) may not be.
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "version=${version}"
            echo "major=${major}"
            echo "minor=${minor}"
            echo "image=ghcr.io/${repo_lc}"
            echo "owner_lc=${owner_lc}"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing v${version} (image ghcr.io/${repo_lc})"

  # Build each arch on its NATIVE hosted runner — no QEMU emulation (the arm64 QEMU build was the
  # slow leg). Each pushes by digest with a buildx GHA layer cache (per-arch scope); `merge` then
  # assembles the multi-arch manifest. (If `ubuntu-24.04-arm` isn't available on the plan, the arm64
  # leg will queue — fall back to a single QEMU build.)
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE: ${{ needs.version.outputs.image }} # lowercased ghcr.io/<owner>/<repo>
      DOCKER_BUILD_RECORD_UPLOAD: "false" # skip the *.dockerbuild build-record artifact
    steps:
      - uses: actions/checkout@v5
      - name: Prepare platform name
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push by digest (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            GROWLERDB_VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into one tagged multi-arch manifest, then sign + SBOM the manifest.
  merge:
    needs: [version, build]
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ needs.version.outputs.image }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Immutable X.Y.Z + moving X.Y, X, and latest so consumers can pin exactly or float.
      - name: Create + push the manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          # Each digest artifact is a file named after its sha256 hex (see the build job).
          srcs=()
          for f in *; do srcs+=("${IMAGE}@sha256:${f}"); done
          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.version.outputs.version }}" \
            -t "${IMAGE}:${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }}" \
            -t "${IMAGE}:${{ needs.version.outputs.major }}" \
            -t "${IMAGE}:latest" \
            "${srcs[@]}"
      - name: Resolve the manifest digest
        id: digest
        run: |
          d=$(docker buildx imagetools inspect "${IMAGE}:${{ needs.version.outputs.version }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${d}" >> "$GITHUB_OUTPUT"
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign the manifest (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.digest.outputs.digest }}"
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Attest the SBOM to the manifest
        run: cosign attest --yes --predicate sbom.cdx.json --type cyclonedx "${IMAGE}@${{ steps.digest.outputs.digest }}"
      - uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.cdx.json

  helm:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - name: Login to GHCR (OCI registry)
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      # The chart keeps its own SemVer (Chart.yaml `version`); only appVersion tracks the release.
      - name: Package + push the chart
        run: |
          helm package deploy/helm/growlerdb --app-version "${{ needs.version.outputs.version }}" -d dist
          helm push dist/growlerdb-*.tgz oci://${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/charts

  binaries:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
      - name: Install cross
        run: cargo install cross --locked || true
      - name: Build the release binary
        env:
          GROWLERDB_VERSION: ${{ needs.version.outputs.version }}
        run: cross build --release --locked -p growlerdb-cli --target ${{ matrix.target }}
      - name: Stage + checksum
        run: |
          mkdir -p dist
          bin=target/${{ matrix.target }}/release/growlerdb
          out=dist/growlerdb-${{ matrix.target }}
          cp "$bin" "$out"
          sha256sum "$out" > "$out.sha256"
      - uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.target }}
          path: dist/*

  release:
    needs: [version, merge, helm, binaries]
    runs-on: ubuntu-latest
    steps:
      # Only the release assets — NOT the internal digests-* or docker/build-push-action's
      # auto-uploaded *.dockerbuild build records (downloading those flaked the job).
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: "{bin-*,sbom}"
      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/growlerdb-*
            artifacts/**/sbom.cdx.json
