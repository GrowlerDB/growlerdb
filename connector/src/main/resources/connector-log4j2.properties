# Connector log hygiene. Spark/Hadoop/Iceberg log at INFO by default and flood the
# container's 10 MB log within minutes at streaming cadence — which is exactly why the connector's
# own ingest lines had rotated past the window when the silent 6-row loss was investigated ("the logs
# rotated" blindness). Quiet the framework loggers to WARN so the connector's status survives.
#
# The connector prints its OWN status to stdout directly (System.out/err), not through log4j, so this
# only suppresses the framework noise — never the connector's lines. Its durable ingest signals are
# the Prometheus metrics (ConnectorMetrics), which survive rotation entirely.
#
# Loaded by pointing spark-submit at it: `-Dlog4j2.configurationFile=connector-log4j2.properties`
# (the connector jar is on the driver classpath in local mode, so the resource resolves by name).
status = warn
name = ConnectorLogging

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

rootLogger.level = warn
rootLogger.appenderRef.console.ref = console

# Keep the connector's own package at INFO if it ever logs through a logger (it mostly uses stdout).
logger.growlerdb.name = io.growlerdb.connector
logger.growlerdb.level = info
