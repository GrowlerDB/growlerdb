# otel-lgtm's default bundled-Prometheus config, plus `rule_files` so GrowlerDB's SLI alerting
# rules (task-111) are evaluated server-side. Mounted over /otel-lgtm/prometheus.yaml.
# Keep the non-`rule_files` sections in sync with the image default on upgrade:
#   docker run --rm --entrypoint cat grafana/otel-lgtm:latest /otel-lgtm/prometheus.yaml
---
global:
  scrape_native_histograms: true
otlp:
  keep_identifying_resource_attributes: true
  # Recommended attributes to be promoted to labels.
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment # backward compatibility
    - deployment.environment.name
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database # used by otelcol/receiver/mongodb
    - kafka.cluster.alias
storage:
  tsdb:
    # A 10min time window is enough because it can easily absorb retries and network delays.
    out_of_order_time_window: 10m
# GrowlerDB SLI alerting rules — firing alerts surface at /api/v1/alerts (no Alertmanager needed).
rule_files:
  - /otel-lgtm/growlerdb-alert-rules.yml
