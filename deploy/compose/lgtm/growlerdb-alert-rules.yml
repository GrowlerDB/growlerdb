# Server-side alerting rules for GrowlerDB SLIs. Evaluated by the bundled Prometheus
# in the otel-lgtm image; firing alerts surface at `/api/v1/alerts`, which the Engine normalizes
# and the console reads via `GET /v1/alerts`. Thresholds mirror the console's local fallback
# checks (ui/src/lib/stats.ts `evaluateAlerts`) so the two agree on healthy/unhealthy.
groups:
  - name: growlerdb-sli
    rules:
      - alert: HighQueryErrorRate
        expr: sum(rate(growlerdb_query_errors_total[5m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Query error rate {{ $value | printf "%.3f" }}/s exceeds 0.05/s'
          description: 'GrowlerDB query errors are elevated over the last 5m.'

      - alert: HighQueryLatency
        expr: max(growlerdb_query_duration_seconds{quantile="0.99"}) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'p99 query latency {{ $value | printf "%.2f" }}s exceeds 1s'
          description: 'GrowlerDB p99 query latency is above target.'

      - alert: StaleLocatorChurn
        expr: sum(rate(growlerdb_stale_locators_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Stale-locator churn {{ $value | printf "%.2f" }}/s exceeds 1/s'
          description: 'Hydration is discarding stale locators faster than expected.'

      # Index↔source drift early-warning: GetByKey returning far fewer rows than keys
      # requested means search hits whose keys no longer exist in the source — a stale index, e.g.
      # after a recreated source table. Sustained high miss fraction → reindex. The denominator is
      # clamped so a quiet period can't blow the ratio up.
      - alert: HydrationMissRate
        expr: |
          (
            sum(rate(growlerdb_hydration_keys_requested_total[5m]))
            - sum(rate(growlerdb_hydration_keys_found_total[5m]))
          ) / clamp_min(sum(rate(growlerdb_hydration_keys_requested_total[5m])), 0.01) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Hydration miss rate {{ $value | humanizePercentage }} exceeds 20%'
          description: 'GetByKey is failing to hydrate a high fraction of requested keys — the index may be drifting from its source (e.g. a recreated source table; task-114). Reindex if confirmed.'

      # --- Ingest silent-loss guards -----------------------------------------------
      # Any of these firing means a loss-guard tripped or ingest silently stalled.

      # The connector's expected-row-count gate refused a window as an under-read. This is the direct
      # silent-loss signature: alert on ANY occurrence.
      - alert: IngestUnderReadStall
        expr: sum(increase(growlerdb_connector_under_reads_total[10m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: 'Connector refused {{ $value | printf "%.0f" }} under-read window(s) in 10m'
          description: 'The changelog scan returned fewer rows than the source committed; the connector halted the trigger rather than advancing the checkpoint over the gap (task-194). Ingest is stalled loudly — investigate the source/compaction race.'

      # The Node's checkpoint-continuity guard rejected a batch (a lineage gap / regression /
      # cross-wiring). Should never happen in steady state.
      - alert: CheckpointGapRejected
        expr: sum(increase(growlerdb_checkpoint_gap_total[10m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: 'Node rejected {{ $value | printf "%.0f" }} batch(es) as a checkpoint gap in 10m'
          description: 'A batch did not continue from a shard''s checkpoint (task-194 continuity guard) — a lineage gap, checkpoint regression, or cross-wired sub-batch. The shard refused to advance over unapplied data.'

      # Reconcile repaired drift — the backstop found the index diverged from the source.
      - alert: DriftRepaired
        expr: sum(increase(growlerdb_drift_stale_total[1h]) + increase(growlerdb_drift_missing_total[1h])) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: 'Reconcile repaired {{ $value | printf "%.0f" }} drifted doc(s) in 1h'
          description: 'The reconcile backstop deleted stale / re-indexed missing docs — the index had silently drifted from the source (task-195). Investigate the ingest path; the affected keys are in the node logs.'

      # Idle-lag: ingest is behind and NOT catching up — the checkpoint is stuck while the source has
      # moved on. Distinct from a transient catch-up: `for: 15m` requires it to be sustained.
      - alert: IngestIdleLag
        expr: max(growlerdb_ingest_lag_ms) > 300000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'Ingest lag {{ $value | printf "%.0f" }}ms sustained over 15m'
          description: 'A shard has been >5m behind the source head for 15m — ingest is stalled, not catching up. Check the connector (stream restarts / write retries) and the nodes.'
