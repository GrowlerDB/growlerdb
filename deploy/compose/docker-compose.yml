name: growlerdb-dev

# Local dev/test dependencies for GrowlerDB: object storage (MinIO) + Iceberg REST
# catalog (Apache Polaris). A seeded sample table is created by the `seed` profile.
#
# The `stack` profile additionally runs **GrowlerDB itself** (control-plane + node +
# gateway) and a full **LGTM** observability stack — a single-host alternative to the
# Kubernetes deployment, and the environment integration tests run against. See README.md.

# --- shared bits for the GrowlerDB services (one image, one env block) -----
# By default the stack PULLS the latest official release image (`ghcr.io/growlerdb/growlerdb:latest`)
# so `just stack` comes up in a pull, no ~10-minute source build. To run a specific release, set
# `GROWLERDB_IMAGE=ghcr.io/growlerdb/growlerdb:v0.3.0` (immutable) for a reproducible stack. To build
# from your checkout instead (developing GrowlerDB itself), set `GROWLERDB_IMAGE=growlerdb-local:dev`
# and `docker compose build` — that tag then drives both build and run.
x-growlerdb-image: &growlerdb-image
  image: ${GROWLERDB_IMAGE:-ghcr.io/growlerdb/growlerdb:latest}
  build:
    context: ../..
    dockerfile: deploy/Dockerfile
  # Self-heal: a crashed/OOM-killed control-plane, node, or gateway restarts instead of
  # staying down — the Compose analogue of the k8s pods' implicit always-restart + liveness probes.
  restart: unless-stopped

x-growlerdb-env: &growlerdb-env
  # Point the binary at the in-network Polaris + MinIO (overrides IcebergConfig defaults).
  GROWLERDB_CATALOG_URI: http://polaris:8181/api/catalog
  GROWLERDB_WAREHOUSE: growlerdb
  GROWLERDB_CATALOG_CREDENTIAL: root:s3cr3t
  GROWLERDB_S3_ENDPOINT: http://minio:9000
  # Export traces (OTLP/HTTP) to the LGTM collector.
  GROWLERDB_OTLP_ENDPOINT: http://lgtm:4318
  # Built-in authN for the demo: the control-plane mints HS256 session JWTs via
  # `/v1/login` and the gateway validates them with this SAME shared secret. This is a DEMO secret,
  # deliberately baked in so `just stack` demonstrates real login + per-index RBAC — NOT a
  # production credential. Rotate/replace it (and set your own demo password) for any real deployment.
  GROWLERDB_AUTH_SECRET: demo-stack-hs256-secret-change-me
  # Shared service token gating the internal control-plane RPCs (registration, shard-map reads,
  # placement). The control-plane requires it and every service that dials the control-plane
  # (node, node-catalog, gateway, connector) presents it, so the demo mesh authenticates and the
  # control plane is CLOSED by default — no unauthenticated internal access. A DEMO value baked in
  # like GROWLERDB_AUTH_SECRET; rotate it for any real deployment.
  GROWLERDB_SERVICE_TOKEN: demo-stack-service-token-change-me
  # Where the local embedder (Candle) loads its model from: `${GROWLERDB_MODEL_DIR}/<model-id>/`.
  # The node + node-catalog bind-mount the host model dir at /models (the `model-fetch` one-shot
  # provisions bge-small-en-v1.5 there once per machine), so ingest embeds the VECTOR field locally —
  # no API key. Gateway/control-plane don't embed and ignore it.
  GROWLERDB_MODEL_DIR: /models

services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped   # object store self-heals
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/growlerdb-warehouse &&
      echo 'buckets ready'
      "

  # One-shot: provision the local embedding model (bge-small-en-v1.5, ~130 MB) into the HOST bind
  # mount ONCE per machine, so `growlerdb index` can embed the catalog `body_vec` VECTOR field with
  # the in-process Candle embedder — fully local, no API key. Mirrors `createbuckets`: a tiny image
  # (alpine + curl) running an inline `/bin/sh -c`. Idempotent — if the 3 model files are already
  # present it echoes and exits 0 (so re-running `just stack` is instant and the copy is reused,
  # shared with host `cargo test`/eval via the same GROWLERDB_MODEL_DIR). Runs as root (default in
  # alpine) so it can WRITE the bind mount; node/node-catalog gate on its success before they build.
  # The model is NOT baked into deploy/Dockerfile (the release image) — provisioning is host-side.
  # `$$` escapes `$` from compose interpolation, so the vars expand in the shell, not in compose.
  model-fetch:
    profiles: ["stack"]
    image: alpine:3.20
    volumes:
      - ${MODEL_HOST_DIR:-./model-cache}:/models
    entrypoint: >
      /bin/sh -c "
      set -e;
      dir=/models/bge-small-en-v1.5;
      base=https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main;
      onnx=https://huggingface.co/Xenova/bge-small-en-v1.5/resolve/main/onnx/model_quantized.onnx;
      if [ -f \"$$dir/config.json\" ] && [ -f \"$$dir/tokenizer.json\" ] && [ -f \"$$dir/model.onnx\" ]; then
        echo 'model present, skipping'; exit 0;
      fi;
      apk add --no-cache curl;
      mkdir -p \"$$dir\";
      curl -fSL --retry 3 -o \"$$dir/config.json\"    \"$$base/config.json\";
      curl -fSL --retry 3 -o \"$$dir/tokenizer.json\" \"$$base/tokenizer.json\";
      curl -fSL --retry 3 -o \"$$dir/model.onnx\"     \"$$onnx\";
      echo 'model fetched'
      "

  # Iceberg REST catalog. Image/env are version-sensitive; verify on first bring-up.
  # Persistent metastore for Polaris (relational-jdbc → Postgres). Without it Polaris keeps the
  # catalog IN MEMORY and forgets every table on restart — which silently orphans the node's index
  # (the index keeps doc keys from the dropped table → hydration "row not found").
  # A volume-backed Postgres lets the catalog survive an accidental Polaris bounce.
  polaris-db:
    image: postgres:17-alpine
    restart: unless-stopped   # catalog metastore self-heals
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    volumes:
      - polaris-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris -d polaris"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: bootstrap the POLARIS realm + root principal into the Postgres metastore, and must
  # complete before the server serves. Compose re-runs one-shots on every `up`, and the admin tool
  # errors (non-zero) when the metastore is already bootstrapped — so wrap it to treat that case as
  # a no-op success, keeping restarts idempotent. (`$$` escapes `$` from compose interpolation.)
  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    depends_on:
      polaris-db:
        condition: service_healthy
    environment:
      polaris.persistence.type: relational-jdbc
      quarkus.datasource.db-kind: postgresql
      quarkus.datasource.username: polaris
      quarkus.datasource.password: polaris
      quarkus.datasource.jdbc.url: jdbc:postgresql://polaris-db:5432/polaris
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        out=$$(java -jar /deployments/polaris-admin-tool.jar bootstrap -r POLARIS -c POLARIS,root,s3cr3t 2>&1);
        echo "$$out";
        echo "$$out" | grep -q "already been bootstrapped" && { echo "realm already bootstrapped - ok"; exit 0; };
        echo "$$out" | grep -q "Bootstrap completed successfully" && exit 0;
        exit 1

  polaris:
    image: apache/polaris:latest
    restart: unless-stopped   # catalog server self-heals; recovers automatically when it returns
    depends_on:
      createbuckets:
        condition: service_completed_successfully
      polaris-db:
        condition: service_healthy
      polaris-bootstrap:
        condition: service_completed_successfully
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL_S3: http://minio:9000
      # Persistent relational-jdbc metastore (Postgres) — the catalog survives restarts, so a
      # Polaris bounce no longer wipes the demo and orphans the index. Realm is bootstrapped into
      # the DB by the polaris-bootstrap one-shot above.
      polaris.persistence.type: relational-jdbc
      quarkus.datasource.db-kind: postgresql
      quarkus.datasource.username: polaris
      quarkus.datasource.password: polaris
      quarkus.datasource.jdbc.url: jdbc:postgresql://polaris-db:5432/polaris
    ports:
      - "8181:8181"   # Iceberg REST

  # Changelog read in Spark **local mode** against a temp Iceberg table
  # (Hadoop catalog) — self-contained, no MinIO/Polaris. Runs the prebuilt fat jar
  # (`cd connector && mise exec -- mvn package`) via spark-submit; the app creates a
  # table, applies INSERT/UPDATE/DELETE, reads the changelog, and exits non-zero on
  # mismatch — so `--exit-code-from spark` gives pass/fail. Enable with: --profile spark
  spark:
    profiles: ["spark"]
    image: apache/spark:4.0.0
    volumes:
      - ../../connector/target/growlerdb-connector-0.0.0.jar:/opt/growlerdb/connector.jar:ro
    entrypoint: ["/opt/spark/bin/spark-submit"]
    command:
      - --master
      - "local[2]"
      # Iceberg Spark runtime (the `provided` dep) — fetched into a writable ivy cache.
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - --packages
      - org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.0
      - --class
      - io.growlerdb.connector.ChangelogReadApp
      - /opt/growlerdb/connector.jar

  # Creates the sample `growlerdb.docs` Iceberg table. Enable with: --profile seed
  seed:
    profiles: ["seed"]
    build: ./seed
    depends_on:
      - polaris
    environment:
      POLARIS_URI: http://polaris:8181/api/catalog
      POLARIS_CATALOG: growlerdb
      POLARIS_CREDENTIAL: root:s3cr3t
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_REGION: us-east-1 # MinIO ignores it, but it silences pyiceberg's "unable to resolve region"

  # --- `stack` profile: GrowlerDB + LGTM (the deployable cluster) -------------------
  # Bring up with `just stack` (deps + catalog + seed must come first; the recipe
  # sequences them). All three GrowlerDB services share one image + env (anchors above).

  # Full LGTM observability stack in one image: Grafana (:3000) + OTLP receiver
  # (:4317 gRPC / :4318 HTTP) → Loki / Tempo / Mimir(Prometheus). GrowlerDB ships OTLP here.
  lgtm:
    profiles: ["stack"]
    image: grafana/otel-lgtm:latest
    restart: unless-stopped   # observability stack self-heals
    ports:
      - "3000:3000"   # Grafana UI (anonymous admin in this dev image)
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      # Scrape GrowlerDB's /metrics into the bundled Prometheus, and pre-wire the SLI dashboard.
      - ./lgtm/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ./lgtm/grafana-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/growlerdb.yaml:ro
      - ./lgtm/dashboards:/otel-lgtm/growlerdb-dashboards:ro
      # Evaluate GrowlerDB SLI alerting rules server-side; fired alerts → /api/v1/alerts.
      - ./lgtm/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./lgtm/growlerdb-alert-rules.yml:/otel-lgtm/growlerdb-alert-rules.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Host CPU / memory / disk for the Observability "Runtime" panels. Mounts the host
  # /proc, /sys, and rootfs read-only so it reports real host metrics; the collector scrapes it into
  # the bundled Prometheus alongside the GrowlerDB /metrics. Without it the Runtime CPU/mem/disk
  # cards show a "needs the metrics stack" state.
  node-exporter:
    profiles: ["stack"]
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped   # host-metrics exporter self-heals
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  # Control Plane: the cluster index registry (gRPC :50071), health/metrics on :9101.
  controlplane:
    profiles: ["stack"]
    <<: *growlerdb-image
    # `--login-secret`: enable the `/v1/login` RPC (mints session JWTs from the registry
    # credential store) and seed the built-in users, but keep the control plane's OWN *user*
    # authorization OPEN — the user-enforcement point is the gateway (`--builtin-auth`) on the public
    # data plane. The internal node/gateway/connector RPCs (registration, shard-map reads, placement)
    # are separately closed with the shared GROWLERDB_SERVICE_TOKEN (x-growlerdb-env anchor), which the
    # control-plane reads from the env — so those RPCs require the mesh credential. Demo user seeded below.
    command: ["control-plane", "--addr", "0.0.0.0:50071", "--metrics-addr", "0.0.0.0:9101", "--login-secret"]
    environment:
      <<: *growlerdb-env
      # Demo login: a well-known baked-in credential, scoped to exactly the two demo indexes
      # so per-index RBAC is EXERCISED, not bypassed. Seeded on first boot only.
      #   user `demo` / password `demo`, roles [reader, operator], indexes [docs, catalog,
      #   movies] — `movies` is the opt-in demo corpus (`just demo-data`); the claim is inert
      #   until that profile stands the index up.
      # Change these for any non-demo use.
      GROWLERDB_DEMO_USER: demo
      GROWLERDB_DEMO_PASSWORD: demo
      GROWLERDB_DEMO_INDEXES: docs,catalog,movies
      # A well-known admin password for the walkthrough's Admin-scoped steps (reindex, §8) — so the
      # tutorial can log in as `admin`/`admin` deterministically instead of grepping a generated
      # password out of the logs. DEMO ONLY; set your own for any real deployment. (Without this the
      # control plane seeds `admin` with a generated, printed-once password.)
      GROWLERDB_ADMIN_PASSWORD: admin
    depends_on:
      polaris:
        condition: service_started
    ports:
      - "50071:50071"
      - "9101:9101"
    volumes:
      - cp-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9101/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Node: build the `docs` index from the seeded Iceberg table, then serve it (gRPC :50051,
  # REST :8080), health/metrics on :9102. The `just stack` recipe seeds the table first.
  # `--register` announces the served index to the control-plane registry (at its routable
  # `--advertise-addr`), so it shows up in the Indexes + Ingestion screens.
  node:
    profiles: ["stack"]
    <<: *growlerdb-image
    entrypoint: ["/bin/sh", "-c"]
    # Serves the seeded `docs` table. The streaming demo (`just pipeline`) layers
    # pipeline.override.yml on top to serve `telemetry_stream` instead — see that file.
    command:
      - >
        growlerdb index growlerdb.docs --name docs &&
        growlerdb serve docs --addr 0.0.0.0:50051 --rest-addr 0.0.0.0:8080 --metrics-addr 0.0.0.0:9102
        --register http://controlplane:50071 --advertise-addr http://node:50051
    environment:
      <<: *growlerdb-env
    depends_on:
      polaris:
        condition: service_started
      controlplane:
        condition: service_healthy
      # Wait for the local embedding model so the `growlerdb index` build step can embed any VECTOR
      # field in-process (no API key). The one-shot completes once, then the copy is reused.
      model-fetch:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
      - "9102:9102"
    volumes:
      - node-data:/data
      # Read the local embedding model (bge-small-en-v1.5) at /models; GROWLERDB_MODEL_DIR points here.
      - ${MODEL_HOST_DIR:-./model-cache}:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9102/readyz"]
      interval: 5s
      timeout: 3s
      retries: 60

  # Node (catalog): a SECOND index alongside `docs` — builds the richer `growlerdb.catalog`
  # table with catalog.yaml and serves+registers it (gRPC :50052, REST :8083, metrics :9104). The
  # `--all-indexes` gateway routes `{"index":"catalog", ...}` requests here automatically — no gateway
  # change needed. Demonstrates multi-index routing end to end and backs the getting-started
  # "query playground". Seed creates the table first (the `just stack` recipe seeds before this profile).
  # In its OWN `catalog` profile (not `stack`): `just stack` activates both, but the streaming demo
  # (`just pipeline`, which activates `stack`+`pipeline`) must NOT pull it in — there is no seeded
  # `growlerdb.catalog` source there, so it could never build and would block the gateway forever.
  node-catalog:
    profiles: ["catalog"]
    <<: *growlerdb-image
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        growlerdb index growlerdb.catalog --def /catalog.yaml --name catalog &&
        growlerdb serve catalog --addr 0.0.0.0:50052 --rest-addr 0.0.0.0:8083 --metrics-addr 0.0.0.0:9104
        --register http://controlplane:50071 --advertise-addr http://node-catalog:50052
    environment:
      <<: *growlerdb-env
    depends_on:
      polaris:
        condition: service_started
      controlplane:
        condition: service_healthy
      # The `catalog` index has a `body_vec` VECTOR field, so its build embeds `body` locally — wait
      # for the model to be provisioned before building.
      model-fetch:
        condition: service_completed_successfully
    ports:
      - "50052:50052"
      - "9104:9104"
    volumes:
      - node-catalog-data:/data
      - ./catalog.yaml:/catalog.yaml:ro
      # The local embedding model (bge-small-en-v1.5) at /models; GROWLERDB_MODEL_DIR points here.
      - ${MODEL_HOST_DIR:-./model-cache}:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9104/readyz"]
      interval: 5s
      timeout: 3s
      retries: 60

  # ---- Opt-in demo corpus (profile `demo-data`, run via `just demo-data`) ----------
  # A slice of Wikipedia movie plots (CC-BY-SA-4.0): the loader writes the parquet into Iceberg
  # FIRST (`growlerdb.movies`, the system of record), then `node-movies` builds + serves the
  # vector-enabled index from it — same lakehouse-first shape as everything else.
  demo-data:
    profiles: ["demo-data"]
    build: ./demo-data
    depends_on:
      - polaris
    environment:
      POLARIS_URI: http://polaris:8181/api/catalog
      POLARIS_CATALOG: growlerdb
      POLARIS_CREDENTIAL: root:s3cr3t
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_REGION: us-east-1 # MinIO ignores it, but it silences pyiceberg's "unable to resolve region"
      # The pre-sliced parquet (a GitHub release asset). Override the URL, change the row cap
      # (0 = the full corpus), or bind-drop a file into ./demo-data/local and set
      # DEMO_DATA_FILE=/local/<name>.parquet to load without a download.
      # Default 5000 films: the local ONNX BGE embedder does ~500 docs/s in-container, so the
      # index build + embed + serve is ~45s. The parquet is decade-interleaved, so the head slice
      # still spans the decades. Raise it (or 0) for the full corpus.
      DEMO_DATA_URL: ${DEMO_DATA_URL:-https://github.com/GrowlerDB/growlerdb/releases/download/demo-data-v1/movies-20k.parquet}
      DEMO_DATA_SIZE: ${DEMO_DATA_SIZE:-5000}
      DEMO_DATA_FILE: ${DEMO_DATA_FILE:-}
    volumes:
      - ./demo-data/local:/local

  # Builds + serves the `movies` index (VECTOR plot_vec — embeds locally at build, so it
  # waits on model-fetch like node-catalog). Registers with the control plane; the
  # `--all-indexes` gateway then routes `{"index":"movies"}` requests here automatically.
  node-movies:
    profiles: ["demo-data"]
    <<: *growlerdb-image
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        growlerdb index growlerdb.movies --def /movies.yaml --name movies &&
        growlerdb serve movies --addr 0.0.0.0:50053 --rest-addr 0.0.0.0:8084 --metrics-addr 0.0.0.0:9106
        --register http://controlplane:50071 --advertise-addr http://node-movies:50053
    environment:
      <<: *growlerdb-env
    depends_on:
      polaris:
        condition: service_started
      controlplane:
        condition: service_healthy
      model-fetch:
        condition: service_completed_successfully
    ports:
      - "50053:50053"
      - "9106:9106"
    volumes:
      - node-movies-data:/data
      - ./movies.yaml:/movies.yaml:ro
      # The local embedding model (bge-small-en-v1.5) at /models; GROWLERDB_MODEL_DIR points here.
      - ${MODEL_HOST_DIR:-./model-cache}:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9106/readyz"]
      interval: 5s
      timeout: 3s
      retries: 60

  # Gateway: the public Engine API (gRPC :50061 + REST :8080→host 8081), fronting the node.
  # health/metrics on :9103. This is the address clients hit.
  gateway:
    profiles: ["stack"]
    <<: *growlerdb-image
    command:
      - "gateway"
      # Built-in authN: validate the HS256 session JWTs the control-plane's `/v1/login`
      # mints, using the shared GROWLERDB_AUTH_SECRET, and enforce RBAC + per-index scoping. The console
      # learns this via `/v1/config` and shows a login form (not open mode).
      - "--builtin-auth"
      # Front EVERY registered index over one endpoint (multi-index routing): each request
      # routes to its named index's shards, resolved lazily from the control-plane and hot-reloaded
      # per index. Per-index RBAC still applies.
      - "--all-indexes"
      - "--addr"
      - "0.0.0.0:50061"
      - "--rest-addr"
      - "0.0.0.0:8080"
      - "--metrics-addr"
      - "0.0.0.0:9103"
      # Serve the console + back its Indexes / Observability screens.
      - "--ui-dir"
      - "/usr/share/growlerdb/ui"
      - "--control-plane"
      - "http://controlplane:50071"
      - "--prometheus"
      - "http://lgtm:9090"
      # Optional OpenSearch-compatible `_search` adapter — `<index>/_search`.
      - "--opensearch"
    environment:
      <<: *growlerdb-env
      # The console's front door: land a fresh visitor on `movies` (a VECTOR index) so semantic +
      # hybrid search are one click away, not on the plain `docs` skeleton. Advertised via
      # `/v1/config`; the console falls back to the first index if `movies` isn't present (e.g. the
      # streaming demo, which never loads it), so this is safe to set unconditionally.
      GROWLERDB_DEFAULT_INDEX: movies
    depends_on:
      node:
        condition: service_healthy
      # NOTE: no hard dependency on `node-catalog` — the `--all-indexes` gateway resolves each index
      # lazily from the control plane and hot-reloads per index, so `catalog` becomes queryable as
      # soon as node-catalog registers (a second or two after bring-up). A hard `depends_on` here
      # would also drag node-catalog into the streaming demo (`depends_on` ignores profiles), where
      # it has no source table and would block the gateway — see node-catalog's `catalog` profile.
      controlplane:
        condition: service_healthy
    ports:
      - "50061:50061"
      - "8081:8080"   # REST Engine API + console (host 8081 to avoid the node's 8080)
      - "9103:9103"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9103/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ---- Streaming demo (profile `pipeline`, run via `just pipeline`) -------------------
  # generator → Redpanda → sink → Iceberg → Spark connector → GrowlerDB index. Watch it land:
  # ingest rate in Grafana (rate(growlerdb_ingested_docs_total)) + lag in the console Ingestion
  # screen (source head − committed). See pipeline/README.md.

  # Kafka-compatible broker (single binary, no ZooKeeper) — the stream transport.
  redpanda:
    profiles: ["pipeline"]
    image: redpandadata/redpanda:latest
    restart: unless-stopped   # stream broker self-heals
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Stage 1: synthesize IoT readings → Redpanda topic `telemetry`. Tune RATE (readings/sec).
  generator:
    profiles: ["pipeline"]
    restart: on-failure
    build: ./pipeline
    command: ["python", "generator.py"]
    environment:
      KAFKA_BROKER: redpanda:9092
      TOPIC: telemetry
      RATE: "50"            # readings/sec — plenty to see the flow; raise for a heavier load
    depends_on:
      redpanda:
        condition: service_healthy

  # Stage 2: Redpanda topic → micro-batch append into Iceberg `growlerdb.telemetry_stream`.
  sink:
    profiles: ["pipeline"]
    restart: on-failure
    build: ./pipeline
    command: ["python", "sink.py"]
    environment:
      KAFKA_BROKER: redpanda:9092
      TOPIC: telemetry
      ICEBERG_TABLE: growlerdb.telemetry_stream
      POLARIS_URI: http://polaris:8181/api/catalog
      POLARIS_CATALOG: growlerdb
      POLARIS_CREDENTIAL: root:s3cr3t
      AWS_ENDPOINT_URL_S3: http://minio:9000
      BATCH_SIZE: "500"
      FLUSH_SECS: "5"       # fewer, larger Iceberg files → less small-file churn on MinIO
    depends_on:
      redpanda:
        condition: service_healthy
      polaris:
        condition: service_started

  # Stage 3: Spark Structured Streaming — read the Iceberg changelog, write DocOps to the node's
  # WriteService (resumes exactly-once from the node's committed checkpoint). Needs the connector
  # fat jar built first: `cd connector && mvn -q -DskipTests package` (done by `just pipeline`).
  connector:
    profiles: ["pipeline"]
    # The connector is a spark-submit job that exits if its streaming query errors. Auto-restart so
    # a transient failure self-heals: on restart it re-reads the Node's committed checkpoint and
    # resumes exactly-once, instead of leaving ingestion frozen while the source keeps growing.
    restart: on-failure
    image: apache/spark:4.0.0
    volumes:
      - ../../connector/target/growlerdb-connector-0.0.0.jar:/opt/growlerdb/connector.jar:ro
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      # Present the shared service token on the connector's control-plane calls (ResolveWindowOwner /
      # GetIndex) so the closed demo control-plane authenticates it. Must match GROWLERDB_SERVICE_TOKEN
      # in the x-growlerdb-env anchor above.
      GROWLERDB_SERVICE_TOKEN: demo-stack-service-token-change-me
    entrypoint: ["/opt/spark/bin/spark-submit"]
    command:
      - --master
      - "local[2]"
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - --packages
      - org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.0,org.apache.iceberg:iceberg-aws-bundle:1.10.0
      # Polaris REST catalog `stream` → MinIO via S3FileIO (own creds; no STS delegation).
      - --conf
      - spark.sql.catalog.stream=org.apache.iceberg.spark.SparkCatalog
      - --conf
      - spark.sql.catalog.stream.type=rest
      # Don't cache table metadata: the long-running stream must see each new append's snapshot, or
      # every trigger reads a stale "current snapshot" and finds nothing to commit.
      - --conf
      - spark.sql.catalog.stream.cache-enabled=false
      - --conf
      - spark.sql.catalog.stream.uri=http://polaris:8181/api/catalog
      - --conf
      - spark.sql.catalog.stream.warehouse=growlerdb
      - --conf
      - spark.sql.catalog.stream.credential=root:s3cr3t
      - --conf
      - spark.sql.catalog.stream.scope=PRINCIPAL_ROLE:ALL
      - --conf
      - spark.sql.catalog.stream.io-impl=org.apache.iceberg.aws.s3.S3FileIO
      - --conf
      - spark.sql.catalog.stream.s3.endpoint=http://minio:9000
      - --conf
      - spark.sql.catalog.stream.s3.path-style-access=true
      - --class
      - io.growlerdb.connector.ConnectorApp
      - /opt/growlerdb/connector.jar
      # ConnectorApp args: stream the changelog into the node's WriteService.
      - --catalog
      - stream
      - --table
      - growlerdb.telemetry_stream
      - --identifier
      - id
      - --fields
      - id,ts,device_id,site,subsystem,metric,status,reading,message
      - --node
      - node:50051
      - --control-plane
      - controlplane:50071
      - --index
      - telemetry_stream
      - --stream
    depends_on:
      node:
        condition: service_healthy
      sink:
        condition: service_started

  # Trino — query the Iceberg tables directly with SQL to see the source data GrowlerDB indexes and
  # compare source vs. index. Reads the same Polaris catalog + MinIO the seed writes. Heavy
  # (JVM), so it's gated behind the `trino` profile: `docker compose --profile trino up -d trino`,
  # then `docker compose exec trino trino` and `SELECT * FROM iceberg.growlerdb.docs;`.
  trino:
    profiles: ["trino"]
    image: trinodb/trino:470
    depends_on:
      polaris:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./trino/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
    ports:
      - "8082:8080" # Trino REST/UI on host 8082 (8081 is the GrowlerDB gateway)
    healthcheck:
      # /v1/info answers before the query engine is ready; wait for "starting":false so
      # `depends_on` doesn't hand users a "server is still initializing" error.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 5s
      timeout: 3s
      retries: 40

volumes:
  minio-data:
  cp-data:
  node-data:
  node-catalog-data:
  node-movies-data:
  polaris-db:
  spark-ivy:
