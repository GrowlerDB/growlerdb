# The opt-in **arXiv demo corpus** index (`just demo-data`) over `growlerdb.arxiv` — ~20k CS
# titles+abstracts, sized so semantic vs lexical vs hybrid visibly differ and agent Q&A over MCP
# has real substance (the 10-row `catalog` can't show ranking quality). Build + serve+register:
#   growlerdb index growlerdb.arxiv --def arxiv.yaml --name arxiv
#   growlerdb serve arxiv --addr 0.0.0.0:50053 --register http://controlplane:50071
# The `--all-indexes` gateway routes `{"index":"arxiv", ...}` requests here automatically.
#
# `abstract` is listed first (the default search field) and — deliberately — **cached**: agents
# read hits' text without a hydration round trip (search alone answers; `hydrate`/inline
# hydration stays the authoritative escalation). At ~1 KB × 20k rows the cache cost is small.
name: arxiv
source:
  iceberg:
    catalog: growlerdb
    table: growlerdb.arxiv
key:
  identifier_fields: [id]
mapping:
  selection: EXPLICIT
  fields:
    - { path: id, type: KEYWORD }
    - { path: abstract, type: TEXT, cached: true, default_field: true }
    - { path: title, type: TEXT, cached: true }
    - { path: authors, type: TEXT, cached: true }
    # The primary category is the facet/filter axis (`primary_category:cs.LG`), aggregatable
    # for the console's left rail and the MCP `aggregate` tool.
    - { path: primary_category, type: KEYWORD, cached: true, fast: true }
    # All categories as analyzed text — `categories:cs.cl` term-matches any listed category.
    - { path: categories, type: TEXT }
    - { path: published, type: DATE, format: epoch_ms, fast: true }
    - { path: updated, type: DATE, format: epoch_ms, fast: true }
    # Local BGE embedding of the abstract at ingest → semantic + hybrid search, keyless.
    - { path: abstract_vec, type: VECTOR, vector: { source_field: abstract, dims: 384, model: bge-small-en-v1.5 } }
