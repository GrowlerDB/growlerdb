# Trino catalog: the same Polaris (Iceberg REST) + MinIO the seed writes to, so `SELECT`s here read
# exactly what GrowlerDB indexes. Query as `iceberg.growlerdb.<table>` (catalog.namespace.table).
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://polaris:8181/api/catalog
iceberg.rest-catalog.warehouse=growlerdb

# Auth to Polaris via its OAuth2 token endpoint (<uri>/v1/oauth/tokens), client-credentials.
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.credential=root:s3cr3t
iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL

# MinIO can't vend STS creds, so don't request delegated/vended credentials — use the static keys
# below (mirrors the seed's empty X-Iceberg-Access-Delegation header).
iceberg.rest-catalog.vended-credentials-enabled=false

# Native S3 against MinIO (path-style, static creds).
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
