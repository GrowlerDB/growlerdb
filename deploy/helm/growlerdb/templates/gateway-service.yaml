apiVersion: v1
kind: Service
metadata:
  name: {{ include "growlerdb.gateway.fullname" . }}
  labels:
    {{- include "growlerdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "growlerdb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  ports:
    - { name: http, port: {{ .Values.gateway.restPort }}, targetPort: http }
    - { name: grpc, port: {{ .Values.gateway.grpcPort }}, targetPort: grpc }
    - { name: metrics, port: {{ .Values.gateway.metricsPort }}, targetPort: metrics }
