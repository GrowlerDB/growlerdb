{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "growlerdb.secretName" . }}
  labels:
    {{- include "growlerdb.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Object-store + catalog credentials (Design 14: Secrets for object-store/Polaris creds).
  catalogCredential: {{ .Values.credentials.catalogCredential | quote }}
  s3AccessKey: {{ .Values.credentials.s3AccessKey | quote }}
  s3SecretKey: {{ .Values.credentials.s3SecretKey | quote }}
{{- end }}
