{{- if .Values.metrics.serviceMonitor.enabled }}
{{- /*
  Prometheus-Operator ServiceMonitor (task-39/40): scrape every component's `metrics` port.
  Requires the monitoring.coreos.com/v1 CRD (kube-prometheus-stack / Prometheus Operator). The
  headless node Service also carries a `metrics` port; we select the regular per-component Services
  by the chart's selector labels and scrape the shared `metrics` endpoint.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "growlerdb.fullname" . }}
  labels:
    {{- include "growlerdb.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames: [{{ .Release.Namespace }}]
  selector:
    matchLabels:
      {{- include "growlerdb.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
