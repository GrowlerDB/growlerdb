# GitHub Pages (just-the-docs) — built natively from this docs/ folder.
# Settings → Pages → Source: "Deploy from a branch" → main / docs.
title: GrowlerDB
description: Open-source retrieval engine — full-text, vector, and hybrid search over your data.
remote_theme: just-the-docs/just-the-docs

# Custom domain: docs served at the root of the docs subdomain (see docs/CNAME).
url: https://docs.growlerdb.com
baseurl: ""

# just-the-docs options
search_enabled: true
heading_anchors: true
# Brand v1.0 dark scheme (docs/_sass/color_schemes/growlerdb.scss) + header lockup (D40).
color_scheme: growlerdb
logo: "/assets/brand/lockup.svg"

# Social unfurl (jekyll-seo-tag): shared links get a title card + description + the brand social
# image. og:image resolves to an absolute URL via `url` above. A large-image Twitter card.
twitter:
  card: summary_large_image
defaults:
  - scope:
      path: ""
    values:
      image: /img/social-preview.png

aux_links:
  "GitHub →":
    - "https://github.com/GrowlerDB/growlerdb"
aux_links_new_tab: true

nav_external_links:
  - title: Source on GitHub
    url: https://github.com/GrowlerDB/growlerdb

footer_content: "GrowlerDB — AGPL-3.0. Search returns coordinates; rows hydrate from Iceberg."

# Needed for the GitHub Pages native build to apply a remote theme + emit social/OG meta.
# jekyll-seo-tag emits per-page <title>/description/OG/Twitter + JSON-LD; jekyll-sitemap
# publishes /sitemap.xml (submitted to search engines — see ../www/README.md).
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Don't publish docs-tooling files as pages.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
