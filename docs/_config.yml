# GitHub Pages (just-the-docs) — built natively from this docs/ folder.
# Settings → Pages → Source: "Deploy from a branch" → main / docs.
title: GrowlerDB
description: Open-source text search engine over Apache Iceberg.
remote_theme: just-the-docs/just-the-docs

# Project-site URL (repo Pages live under /<repo>).
url: https://growlerdb.github.io
baseurl: /growlerdb

# just-the-docs options
search_enabled: true
heading_anchors: true
color_scheme: dark

aux_links:
  "GitHub →":
    - "https://github.com/GrowlerDB/growlerdb"
aux_links_new_tab: true

nav_external_links:
  - title: Source on GitHub
    url: https://github.com/GrowlerDB/growlerdb

footer_content: "GrowlerDB — Apache-2.0. Search returns keys; rows hydrate from Iceberg."

# Needed for the GitHub Pages native build to apply a remote theme.
plugins:
  - jekyll-remote-theme

# Don't publish docs-tooling files as pages.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
