# GitHub Pages (just-the-docs) — built natively from this docs/ folder.
# Settings → Pages → Source: "Deploy from a branch" → main / docs.
title: GrowlerDB
description: Open-source text search engine over Apache Iceberg.
remote_theme: just-the-docs/just-the-docs

# Custom domain: docs served at the root of the docs subdomain (see docs/CNAME).
url: https://docs.growlerdb.com
baseurl: ""

# just-the-docs options
search_enabled: true
heading_anchors: true
# Brand v1.0 dark scheme (docs/_sass/color_schemes/growlerdb.scss) + header lockup (D40).
color_scheme: growlerdb
logo: "/assets/brand/lockup.svg"

aux_links:
  "GitHub →":
    - "https://github.com/GrowlerDB/growlerdb"
aux_links_new_tab: true

nav_external_links:
  - title: Source on GitHub
    url: https://github.com/GrowlerDB/growlerdb

footer_content: "GrowlerDB — AGPL-3.0. Search returns coordinates; rows hydrate from Iceberg."

# Needed for the GitHub Pages native build to apply a remote theme.
plugins:
  - jekyll-remote-theme

# Don't publish docs-tooling files as pages.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
